body:
  text: 睡虎地秦墓竹簡封診式治獄治獄能以書從迹其言毋治諒而得人請為上治諒為下有恐為敗訊獄凡訊獄必先盡聽其言而書之各展其辭雖智其訑勿庸輒詰其辭已盡書而毋解乃以詰者詰之詰之有盡聽書其解辭有視其它毋解者以復詰之詰之極而數訑更言不服其律當治諒者乃治諒治諒之必書曰爰書以某數更言毋解辭治訊某有鞫敢告某縣主男子某有鞫辭曰士五居某里可定名事里所坐論云可可罪赦或覆問毋有遣識者以律封守當騰騰皆為報敢告主封守鄉某爰書以某縣丞某書封有鞫者某里士五甲家室妻子臣妾衣器畜産甲室人一宇二內各有戶內室皆瓦蓋木大具門桑十木妻曰某亡不會封子大女子某未有夫子小男子某高六尺五寸臣某妾小女子某牡犬一幾訊典某某甲伍公士某某甲黨有它當封守而某等脫弗占書且有罪某等皆言曰甲封具此毋它當封者即以甲封付某等與里人更守之侍令覆敢告某縣主男子某辭曰士五居某縣某里去亡可定名事里所坐論云可可罪赦或覆問毋有幾籍亡亡及逋事各幾可日遣識者當騰騰皆為報敢告主盜自告爰書某里公士甲自告曰以五月晦與同里士五丙盜某里士五丁千錢毋它坐來自告告丙即令令史某往執丙捕爰書男子甲縛詣男子丙辭曰甲故士五居某里乃四月中盜牛去亡以命丙坐賊人命自晝甲見丙陰市庸中而捕以來自出甲毋它坐爰書某里士五甲乙縛詣男子丙丁及新錢百一十錢容二合告曰丙盜鑄此錢丁佐鑄甲乙捕索其室而得此錢容來詣之盜馬爰書市南街亭求盜才某里曰甲縛詣男子丙及馬一匹騅牝右剽緹覆衣帛裏莽緣領褎及履告曰丙盜此馬衣今日見亭旁而捕來詣爭牛爰書某里公士甲士五乙詣牛一黑牝曼䋙有角告曰此甲乙牛殹而亡各識共詣來爭之即令令史某齒牛牛六歲矣羣盜爰書某亭校長甲求盜才某里曰乙丙縛詣男子丁斬首一具弩二矢草告曰丁與此首人強攻羣盜人自晝甲將乙等徼循到某山見丁與此首人而捕之此弩矢丁及首人弩矢殹首人以此弩矢乙而以劍伐收其首山儉不能出身山中訊丁辭曰士五居某里此首某里士五戊殹與丁以某時與某里士五己庚辛強攻羣盜某里公士某室盜錢萬去亡己等已前得丁與戊去亡流行毋所主舍自晝居某山甲等而捕丁戊戊射乙而伐殺收首皆毋它坐罪診首毋診身可殹奪首軍戲某爰書某里士五甲縛詣男子丙及斬首一男子丁與偕甲告曰甲尉某私吏與戰刑丘城今日見丙戲旞直以劍伐痍丁奪此首而捕來詣診首已診丁亦診其痍狀某爰書某里士五甲公士鄭才某里曰丙共詣斬首一各告曰甲丙戰刑丘城此甲丙得首殹甲丙相與爭來詣之診首髮其右角痏一所袤五寸深到骨類劍迹其頭所不齊㱚㱚然以書讂首曰有失伍及不來者遣來識戲次告臣爰書某里士五甲縛詣男子丙告曰丙甲臣橋悍不田作不聽甲令謁買公斬以為城旦受賈錢訊丙辭曰甲臣誠悍不聽甲甲未賞身免丙丙毋病殹毋它坐罪令令史某診丙不病令少內某佐某以市正賈賈丙丞某前丙中人賈若干錢丞某告某鄉主男子丙有鞫辭曰某里士五甲臣其定名事里所坐論云可可罪赦或覆問毋有甲賞身免丙復臣之不殹以律封守之到以書言黥妾爰書某里公士甲縛詣大女子丙告曰某里五大夫乙家吏丙乙妾殹乙使甲曰丙悍謁黥劓丙訊丙辭曰乙妾殹毋它坐丞某告某鄉主某里五大夫乙家吏甲詣乙妾丙曰乙令甲謁黥劓丙其問如言不然定名事里所坐論云可或覆問毋有以書言䙲子爰書某里士五甲告曰謁鋈親子同里士五丙足䙲蜀邊縣令終身毋得去䙲所敢告告法丘主士五咸陽才某里曰丙坐父甲謁鋈其足䙲蜀邊縣令終身毋得去䙲所論之䙲丙如甲告以律包今鋈丙足令吏徒將傳及恆書一封詣令史可受代吏徒以縣次傳詣成都成都上恆書太守處以律食法丘已傳為報敢告主告子爰書某里士五甲告曰甲親子同里士五丙不孝謁殺敢告即令令史己往執令史己爰書與牢隸臣某執丙得某室丞某訊丙辭曰甲親子誠不孝甲所毋它坐罪爰書某里典甲詣里人士五丙告曰疑來詣訊丙辭曰以三歲時病疕麋突不可智其可病毋它坐令醫丁診之丁言曰丙毋麋艮本絶鼻腔壞刺其鼻不疐肘膝到兩足下奇潰一所其手毋胈令𤀃其音氣敗殹賊死爰書某亭求盜甲告曰署中某所有賊死結髮不智可男子一人來告即令令史某往診令史某爰書與牢隸臣某即甲診男子死在某室南首正偃某頭左角刃痏一所北二所皆從頭北袤各四寸相耎廣各一寸皆臽中類斧腦角出皆血出柀污頭北及地皆不可為廣袤它完衣布禪裙襦各一其襦北直痏者以刃夬二所應痏襦北及中衽污血男子西有髹秦綦履一兩去男子其一奇六步一十步以履履男子利焉地堅不可智賊迹男子丁壯析色長七尺一寸髮長二尺其腹有久故瘢二所男子死所到某亭百步到某里士五丙田舍二百步令甲以布裙貍男子某所侍令以襦履詣廷訊甲亭人及丙智男子可日死聞寇者不殹經死爰書某里典甲曰里人士五丙經死其室不智故來告即令令史某往診令史某爰書與牢隸臣某即甲丙妻女診丙丙死縣其室東內中北廦權南鄉以枲索大如大指旋通繫頸旋終在項索上終權再周結索餘末袤二尺頭上去權二尺足不傅地二寸頭北傅廦舌出齊唇吻下遺矢弱污兩卻解索其口鼻氣出渭然索迹椒鬱不周項二寸它度毋兵刃木索迹權大一圍袤三尺西去堪二尺堪上可道終索地堅不可智人迹索袤丈衣絡禪襦裙各一踐即令甲女載丙死詣廷診必先謹審視其迹當獨抵死所即視索終終所黨有通迹乃視舌出不出頭足去終所及地各幾可遺矢弱不殹乃解索視口鼻渭然不殹及視索迹鬱之狀道索終所試脫頭能脫乃其衣盡視其身頭髮中及篡舌不出口鼻不渭然索迹不鬱索終急不能脫死難審殹節死久口鼻或不能渭然者自殺者必先有故問其同居以合其故穴盜爰書某里士五乙告曰自宵臧乙復𥿍衣一乙房內中閉其戶乙獨與妻丙晦卧堂上今旦起啓戶取衣人已穴房內勶內中𥿍衣不得不智穴盜者可人人數毋它亡殹來告即令令史某往診求其盜令史某爰書與鄉隸臣某即乙典丁診乙房內房內在其大內東比大內南鄉有戶內後有小堂內中央有新穴穴勶內中穴下齊小堂上高二尺三寸下廣二尺五寸上如豬竇狀其所以埱者類旁鑿迹廣寸大半寸其穴壤在小堂上直穴播壤柀入內中內中及穴中外壤上有膝手迹膝手各六所外壤秦綦履迹四所袤尺二寸其前稠綦袤四寸其中央稀者五寸其𣦟稠者三寸其履迹類故履內北有垣垣高七尺垣北即巷殹垣北去小堂北唇丈垣東去內五步其上有新小壞壞直中外類足歫之之迹皆不可為廣袤小堂下及垣外地堅不可迹不智盜人數及之所內中有竹柖柖在內東北東北去廦各四尺高一尺乙曰𥿍衣柖中央訊乙丙皆言曰乙以乃二月為此衣五十尺帛裏絲絮五斤繆繒五尺緣及殿不智盜者可人及蚤莫毋意殹訊丁乙伍人士五曰見乙有𥿍復衣繆緣及殿新殹不智其裏可物及亡狀以此直衣賈出子爰書某里士五妻甲告曰甲懷子六月矣自晝與同里大女子丙鬭甲與丙相捽丙僨庰甲里人公士丁救別丙甲甲到室即病復痛自宵子變出今甲裹把子來詣自告告丙即令令史某往執丙即診嬰兒男女生髮及保之狀有令隸妾數字者診甲前血出及癰狀有訊甲室人甲到室居處及復痛子出狀丞乙爰書令令史某隸臣某診甲所詣子已前以布巾裹如血狀大如手不可智子即置盎水中榣之咅血子殹其頭身臂手指股以下到足足指類人而不可智目耳鼻男女出水中有咅血狀其一式曰令隸妾數字者某某診甲皆言甲前旁有乾血今尚血出而少非朔事殹某賞懷子而變其前及血出如甲毒言爰書某里公士甲等草人詣里人士五丙皆告曰丙有寧毒言甲等難飲食焉來告之即疏書甲等名事關諜北訊丙辭曰外大母同里丁坐有寧毒言以卅餘歲時䙲丙家節有祠召甲等甲等不肯來亦未嘗召丙飲里節有祠丙與里人及甲等會飲食皆莫肯與丙共杯器甲等及里人弟兄及它人智丙者皆難與丙飲食丙而不把毒毋它坐姦爰書某里士五甲詣男子乙女子丙告曰乙丙相與姦自晝見某所捕校上來詣之亡自出鄉某爰書男子甲自詣辭曰士五居某里以乃二月不識日去亡毋它坐今來自出問之名事定以二月丙子將陽亡三月中逋築宮草日四年三月丁未籍一亡五月十日毋它坐莫覆問以甲獻典乙相診今令乙將之詣論敢言之封診式
